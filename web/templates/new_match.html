{% extends 'base.html' %}
{% block content %}
<form action="{{ url_for('matches.create_match', t_id=team.team_id) }}" method="POST">
    <input type="hidden" id="selectedDateInput" name="match_date">

    <div class="card shadow-sm mb-4 match-header">
        <div class="card-body">
            <div class="row align-items-center text-center g-3">
                <div class="col-md-4">
                    <h2 class="mb-0 fw-semibold">{{ team.name }}</h2>
                </div>
                <div class="col-md-3">
                    <span class="vs-badge text-muted" data-i18n="match_vs">vs</span>
                </div>  
                <div class="col-md-4">
                    <select class="form-select" name="opponent" id="opponent">
                        {% if home %}
                            <option selected>Opponent</option>
                        {% else %}
                            <option selected disabled data-i18n="choose">Choose...</option>
                        {% endif %}
                        {% for opp in teams %}
                            <option value="{{ opp.team_id }}">{{ opp.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-1 d-flex flex-column align-items-center justify-content-center">
                    <div class="form-switch-container">
                        <input type="checkbox" id="awayToggle" name="is_away" class="switch-input">
                        <label for="awayToggle" class="switch-label">
                            <span class="switch-button"></span>
                        </label>
                    </div>
                    <small class="text-muted fw-bold mt-1" style="font-size: 0.7rem;" data-i18n="match_away">AWAY</small>
                </div>
            </div>
        </div>
    </div>
    
    <div class="row g-3 align-items-stretch">
        <div class="col-md-8">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th scope="col" class="col-1" data-i18n="select">Select</th>
                                <th scope="col" class="col-1">#</th>
                                <th scope="col" class="col-2" data-i18n="name">Name</th>
                                <th scope="col" class="col-3">G</th>
                                <th scope="col" class="col-4">A</th>
                                <th scope="col" class="col-5" data-i18n="pts">Pts</th>
                                <th scope="col" class="col-6">+-</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for player in roster %}
                            <tr>
                                <td class="text-center">
                                    <input class="form-check-input" 
                                        type="checkbox"
                                        name="selected_players" 
                                        value="{{ player.member_id }}">
                                </td>
                                <td>{{ player.jersey_number }}</td>
                                <td>{{ player.full_name }}</td>
                                <td></td>
                                <td></td>
                                <td></td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm h-20">
                <div class="card-header bg-light fw-semibold" data-i18n="team_home_facility">Facility</div>
                <div class="card-body">
                    <select class="form-select" name="facility" id="facility">
                        {% if home %}
                            <option selected>{{ home }}</option>
                        {% else %}
                            <option selected disabled data-i18n="choose">Choose...</option>
                        {% endif %}
                        {% for f in facilities %}
                            <option value="{{ f.facility_id }}">{{ f.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <br>
            <div class="card shadow-sm h-20">
                <div class="card-header bg-light fw-semibold" data-i18n="team_home_facility">Date and time</div>
                    <div class="card-body">
                        <input name="date" class="form-control" type="datetime-local"/>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-12 text-end">
            <button type="submit" class="btn btn-primary px-4" data-i18n="create">Create</button>
        </div>
    </div>
</form>

{% endblock %}
