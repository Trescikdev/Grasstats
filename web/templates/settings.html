{% extends 'base.html' %}

{% block content %}

<h1 data-i18n="settings">Settings</h1>

<hr>
<div class="col-lg-2">
    <div class="lang-toggle" role="group" aria-label="Language switch">
        <button type="button" class="lang-flag" data-lang="en" data-i18n-title="switch_lang" title="Switch language" aria-label="English">
            <svg viewBox="0 0 60 30" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <clipPath id="ukclip"><path d="M0,0 v30 h60 v-30 z"/></clipPath>
                <path d="M0,0 v30 h60 v-30 z" fill="#012169"/>
                <path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/>
                <path d="M0,0 L60,30 M60,0 L0,30" clip-path="url(#ukclip)" stroke="#C8102E" stroke-width="4"/>
                <path d="M30,0 v30 M0,15 h60" stroke="#fff" stroke-width="10"/>
                <path d="M30,0 v30 M0,15 h60" stroke="#C8102E" stroke-width="6"/>
            </svg>
        </button>
        <button type="button" class="lang-flag" data-lang="sk" data-i18n-title="switch_lang" title="Switch language" aria-label="Slovenčina">
            <svg viewBox="0 0 60 30" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <rect width="60" height="10" fill="#ffffff"/>
                <rect y="10" width="60" height="10" fill="#0B4EA2"/>
                <rect y="20" width="60" height="10" fill="#EE1C25"/>
            </svg>
        </button>
    </div>
</div>
{% endblock %}
